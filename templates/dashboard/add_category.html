{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}

    <div class="row">

        <!-- Left Sidebar -->
        <!-- Load sidebar here -->
        {% include 'dashboard/sidebar.html' %}

        <!-- Right Side Content -->
        <div class="col-md-10">
            <h3>Add Category</h3> 
            
            <form action="{% url 'add_category' %}" method="POST" style="width: 500px;">
                {% csrf_token %}
                {{ form | crispy }}
                <button class="btn btn-success" type="submit">Submit</button>
            </form>
            <br>
        </div>

    </div>

{% endblock %}
