{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}

<div class="row">
    <!-- Left Sidebar -->
    <!-- Include here -->
    {% include 'dashboard/sidebar.html' %}

    <div class="col-md-10">
        {% if perms.auth.add_user %}
            <div class="text-center">
                <h3>Add New User</h3>
            </div>
            <form action="{% url 'add_user' %}" method="POST">
                {% csrf_token %}
                {{ form | crispy }}
                <button class="btn btn-success" type="submit">Submit</button>
            </form>
        {% else %}
            <h5 class="text-center text-danger">Permission Denied!</h5>
        {% endif %}
    </div>
</div>

{% endblock %}
