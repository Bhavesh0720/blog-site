{% extends 'base.html' %}
{% load crispy_forms_tags %}


{% block content %}

    <div class="row">

        <!-- Left Sidebar -->
        <!-- Load sidebar here -->
        {% include 'dashboard/sidebar.html' %}

        <!-- Right Sidebar -->
        <div class="col-md-10">
            {% if perms.blogs.change_category %}
                <h3>Edit Category</h3>

                <form action="{% url 'edit_category' category.pk %}" method="POST" style="width: 500px;">
                    {% csrf_token %}
                    {{ form | crispy }}
                    <button type="submit" class="btn btn-success">Submit</button>
                </form>
            {% else %}
                <h5 class="text-center text-danger">Permission Denied!</h5>
            {% endif %}
        </div>

    </div>

{% endblock %}
