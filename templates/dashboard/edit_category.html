{% extends 'base.html' %}
{% load crispy_forms_tags %}


{% block content %}

    <div class="row">

        <!-- Left Sidebar -->
        <!-- Load sidebar here -->
        {% include 'dashboard/sidebar.html' %}

        <!-- Right Sidebar -->
        <div class="col-md-10">
            <h3>Edit Category</h3>

            <form action="{% url 'edit_category' category.pk %}" method="POST" style="width: 500px;">
                {% csrf_token %}
                {{ form | crispy }}
                <button type="submit" class="btn btn-success">Submit</button>
            </form>
        </div>

    </div>

{% endblock %}
