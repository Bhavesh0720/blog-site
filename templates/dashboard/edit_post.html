{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}

    <div class="row">
        <!-- Left Sidebar -->
        <!-- Include here -->
        {% include 'dashboard/sidebar.html' %}        

        <!-- Right side content  -->
        <div class="col-md-10">
            {% if perms.blogs.change_blog %}
                <h3 class="text-center">Edit Post</h3>
                <form action="{% url 'edit_post' post.pk %}" method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form | crispy }}
                    <button class="btn btn-success" type="submit">Submit</button>
                </form>
            {% else %}
                <h5 class="text-center text-danger">Permission Denied!</h5>
            {% endif %}
        </div>
    </div>

{% endblock %}
