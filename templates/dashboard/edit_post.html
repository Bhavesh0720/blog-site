{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}

    <div class="row">
        <!-- Left Sidebar -->
        <!-- Include here -->
        {% include 'dashboard/sidebar.html' %}        

        <!-- Right side content  -->
        <div class="col-md-10">
            <h3 class="text-center">Edit Post</h3>
            <form action="{% url 'edit_post' post.pk %}" method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form | crispy }}
                <button class="btn btn-success" type="submit">Submit</button>
            </form>
        </div>
    </div>

{% endblock %}
