{% extends 'base.html' %}
{% load crispy_forms_tags %}
 
{% block content %}
    <div class="row">
        <!-- Left Sidebar -->
        {% include 'dashboard/sidebar.html' %}

        <!-- Right side content -->
        <div class="col-md-10">
            {% if perms.auth.change_user %}
                <h5 class="text-center">Edit User</h5>
                <form action="{% url 'edit_user' user.pk %}" method="POST">
                    {% csrf_token %}
                    {{ form | crispy }}
                    <button class="btn btn-success" type="submit">Submit</button>
                </form>
            {% else %}
                <h5 class="text-center text-danger">Permission Denied!</h5>
            {% endif %}
        </div>
        
    </div>
{% endblock content %}
