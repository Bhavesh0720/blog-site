{% extends 'base.html' %}


{% block content %}
{% load crispy_forms_tags %}

    <h3 class="text-center">Register</h3>
    <form action="{% url 'register' %}" method="POST" style="width: 500px; margin: auto;">
        {% csrf_token %}
        {{ form | crispy }}
        <div class="text-center">
        <button class="btn btn-primary" style="width: 100%;" type="submit">Submit</button></div>
    </form>

{% endblock %}
