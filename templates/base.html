{% load static %}
<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Blogora</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css?family=Playfair+Display:700,900" rel="stylesheet" />

  <!-- Custom CSS -->
  <link href="{% static 'css/blog.css' %}" rel="stylesheet" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <!-- Main Container -->
  <div class="container">

    <!-- Header -->
    <header class="blog-header py-3">
      <div class="row flex-nowrap justify-content-between align-items-center">

        <div class="col-4 pt-1">
          <a class="blog-header-logo text-dark" href="/">Blogora</a>
        </div>
        <div class="col-4">
          <form action="{% url 'search' %}" method="GET">
            <div class="input-group">
              <input class="form-control" name="keyword" value="{{ keyword }}" type="text" placeholder="Enter search term..." aria-label="Enter search term...">
              <button class="btn btn-primary" id="button-search" type="submit">Go!</button>
            </div>
          </form>
        </div>
        <div class="col-4 d-flex justify-content-end align-items-center">
          {% if not user.is_authenticated %}
            <a class="btn btn-sm btn-warning" href="{% url 'login' %}">Login</a>
            <a class="btn btn-sm btn-outline-secondary ml-2" href="{% url 'register' %}">Register</a>
          {% else %}
            <div style="color: blue;">
              <span><a class="btn btn-sm btn-primary" href="{% url 'dashboard' %}">Dashboard</a></span>
              &emsp;
              <a class="btn btn-sm btn-danger" href="{% url 'logout' %}">Logout</a>
            </div>
          {% endif %}
        </div>

      </div>
    </header>

    <!-- Categories Navbar -->
    <div class="nav-scroller py-1 mb-3">
      <nav class="nav d-flex justify-content-between flex-wrap">

        {% for cat in categories %}
          <a class="p-2 text-muted text-dark" href="{% url 'post_by_category' cat.pk %}">
            {{ cat.category_name }}
          </a>
        {% empty %}
          <span class="text-muted p-2">No categories</span>
        {% endfor %}

      </nav>
    </div>

    <!-- Main Content -->
    {% block content %}
    {% endblock %}

  </div> <!-- END container -->

  <!-- Footer -->
  <footer class="blog-footer text-center py-3 mt-4 border-top">
    <p class="mb-0">
      Blogora built with ❤️ by <a href="#">Bhavesh Parmar</a>
    </p>
  </footer>

</body>
</html>
